<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>Roomle Configurator Vanilla JS Embedding</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #configurator-container {
            width: 100vw;
            height: 100vh;
        }

        img {
            height: 1.7rem;
        }

        .gh-link {
            position: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;

            height: 3rem;
            width: 8rem;

            color: #000;
            background: #fff;

            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
            0 4px 6px -4px rgb(0 0 0 / 0.1);

            z-index: 999;
        }
    </style>
</head>
<body>
<div class="gh-link">
    <img src="https://github.githubassets.com/assets/GitHub-Mark-ea2971cee799.png" alt="">
    <a href="https://github.com/roomle-dev/roomle-dev.github.io/tree/master/cdn-embedding-example" target="_blank">Source</a>
</div>

<div id="configurator-container"></div>

<script crossorigin="anonymous" type="module">
    // Import from 'jsdelivr'
    import RoomleConfiguratorApi
        from "https://cdn.jsdelivr.net/npm/@roomle/embedding-lib@6.3.0/roomle-embedding-lib.js";

    // OR import from 'unpkg'
    // import RoomleConfiguratorApi from "https://unpkg.com/@roomle/embedding-lib@6.3.0/roomle-embedding-lib.js";

    (async function () {
        console.log("Starting Roomle");
        const instance = await RoomleConfiguratorApi.createConfigurator(
            "demoConfigurator",
            document.getElementById("configurator-container"),
            {}
        );
        instance.ui.loadObject("usm:frame");
    })();
</script>
</body>
</html>
